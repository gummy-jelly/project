<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CloudPrep — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
  :root {
    --bg-base:   #F5F7FF;
    --bg-1:      #FFFFFF;
    --bg-2:      #EEF1FA;
    --bg-3:      #E3E8F5;
    --border:    #D4DAEE;
    --border-hi: #C0C9E2;
    --text-1:    #1A1E2E;
    --text-2:    #4B5280;
    --text-3:    #8A93B0;
    --blue:      #5B8BFF;
    --blue-dim:  rgba(91,139,255,0.08);
    --blue-glow: rgba(91,139,255,0.15);
    --red:       #E53E5E;
    --red-dim:   rgba(229,62,94,0.08);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 20px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-base);
    color: var(--text-1);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-image:
      linear-gradient(rgba(91,139,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,139,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* HEADER */
  header {
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 40px;
    border-bottom: 1px solid var(--border);
    background: rgba(245,247,255,0.92);
    backdrop-filter: blur(20px);
  }
  .logo {
    display: flex; align-items: center; gap: 9px;
    text-decoration: none;
  }
  .logo-icon {
    width: 30px; height: 30px;
    background: var(--blue);
    border-radius: var(--radius-sm);
    display: grid; place-items: center;
    font-size: 16px; color: #fff;
    font-variation-settings: 'FILL' 1;
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 15px; font-weight: 700;
    color: var(--text-1); letter-spacing: -0.3px;
  }

  /* CENTER */
  .center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    padding: 36px 36px 28px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .card-top::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(91,139,255,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .card-top h1 {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 700;
    letter-spacing: -0.4px;
    margin-bottom: 6px;
    position: relative;
  }
  .card-top p {
    font-size: 13px;
    color: var(--text-2);
    position: relative;
  }

  .card-body { padding: 28px 36px; }

  /* ERROR */
  .error-box {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    background: var(--red-dim);
    border: 1px solid rgba(255,95,126,0.25);
    border-radius: var(--radius-md);
    font-size: 13px;
    color: var(--red);
    margin-bottom: 20px;
  }
  .error-box.show { display: flex; }
  .error-box .material-symbols-rounded { font-size: 16px; flex-shrink: 0; }

  /* FORM */
  .form { display: flex; flex-direction: column; gap: 16px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 12px; font-weight: 500;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .input-wrap { position: relative; }
  .input-wrap .material-symbols-rounded {
    position: absolute; left: 13px; top: 50%;
    transform: translateY(-50%);
    font-size: 17px; color: var(--text-3);
    font-variation-settings: 'FILL' 0, 'wght' 300;
    pointer-events: none;
  }
  .input-wrap input {
    width: 100%;
    padding: 11px 14px 11px 40px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-1);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .input-wrap input::placeholder { color: var(--text-3); }
  .input-wrap input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px var(--blue-dim);
  }
  .pw-toggle {
    position: absolute; right: 12px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--text-3); cursor: pointer;
    padding: 2px;
    display: grid; place-items: center;
    transition: color 0.15s;
  }
  .pw-toggle:hover { color: var(--text-2); }
  .pw-toggle .material-symbols-rounded {
    font-size: 17px;
    font-variation-settings: 'FILL' 0, 'wght' 300;
  }
  .input-wrap input[type=password] { padding-right: 40px; }

  .submit-btn {
    width: 100%;
    padding: 13px;
    background: var(--blue);
    border: none;
    border-radius: var(--radius-md);
    font-family: 'Syne', sans-serif;
    font-size: 14px; font-weight: 700;
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .submit-btn:hover {
    background: #7099FF;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(91,139,255,0.25);
  }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .submit-btn .material-symbols-rounded { font-size: 17px; }

  .card-foot {
    padding: 20px 36px;
    border-top: 1px solid var(--border);
    background: var(--bg-2);
    text-align: center;
    font-size: 13px;
    color: var(--text-2);
  }
  .card-foot a {
    color: var(--blue);
    text-decoration: none;
    font-weight: 600;
  }
  .card-foot a:hover { text-decoration: underline; }
</style>
</head>
<body>

<header>
  <a href="home.html" class="logo">
    <span class="logo-icon material-symbols-rounded">school</span>
    <span class="logo-text">CloudPrep</span>
  </a>
</header>

<div class="center">
  <div class="card">
    <div class="card-top">
      <h1>다시 오셨군요!</h1>
      <p>이메일과 비밀번호를 입력해주세요</p>
    </div>

    <div class="card-body">
      <div class="error-box" id="error-box">
        <span class="material-symbols-rounded">error</span>
        <span id="error-text"></span>
      </div>

      <form class="form" id="login-form">
        <div class="field">
          <label>이메일</label>
          <div class="input-wrap">
            <span class="material-symbols-rounded">mail</span>
            <input type="email" id="email" placeholder="name@example.com" required/>
          </div>
        </div>

        <div class="field">
          <label>비밀번호</label>
          <div class="input-wrap">
            <span class="material-symbols-rounded">lock</span>
            <input type="password" id="password" placeholder="••••••••" required/>
            <button type="button" class="pw-toggle" onclick="togglePw('password', this)">
              <span class="material-symbols-rounded">visibility</span>
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          <span id="btn-text">로그인</span>
          <span class="material-symbols-rounded">arrow_forward</span>
        </button>
      </form>
    </div>

    <div class="card-foot">
      계정이 없으신가요? <a href="signup.html">회원가입</a>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:4000/api';
if (localStorage.getItem('token')) location.href = 'home.html';

function togglePw(id, btn) {
  const input = document.getElementById(id);
  const icon  = btn.querySelector('.material-symbols-rounded');
  input.type  = input.type === 'password' ? 'text' : 'password';
  icon.textContent = input.type === 'password' ? 'visibility' : 'visibility_off';
}

function showError(msg) {
  document.getElementById('error-text').textContent = msg;
  document.getElementById('error-box').classList.add('show');
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  document.getElementById('error-box').classList.remove('show');
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('submit-btn');
  const btnText  = document.getElementById('btn-text');
  btn.disabled = true; btnText.textContent = '로그인 중...';
  try {
    const res  = await fetch(API + '/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok) { showError(data.message || '로그인에 실패했습니다.'); return; }
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    const redirect = sessionStorage.getItem('redirectAfterLogin') || 'home.html';
    sessionStorage.removeItem('redirectAfterLogin');
    location.href = redirect;
  } catch { showError('서버에 연결할 수 없습니다.'); }
  finally { btn.disabled = false; btnText.textContent = '로그인'; }
});
</script>
</body>
</html>

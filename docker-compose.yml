version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: cloudprep-db
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: cloudprep
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5


  be:
    build: ./BE 
    container_name: cloudprep-be
    ports:
      - "4000:4000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root 
      DB_PASSWORD: 1234
      DB_NAME: cloudprep
      JWT_SECRET: cloudprep_jwt_secret_key_2024
      JWT_EXPIRES_IN: 7d
      PORT: 4000
    depends_on:
      db:
        condition: service_healthy

  fe:
    build: ./FE 
    container_name: cloudprep-fe
    ports:
      - "80:80"
    depends_on:
      - be 
  

volumes:
  db_data:
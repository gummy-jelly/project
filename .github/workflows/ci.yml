name: CI Pipeline

on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      - name: Node.js 설정
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: 의존성 설치
        run: |
          cd BE 
          npm install

      - name: Docker Hub 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: BE 이미지 빌드 & 푸시
        uses: docker/build-push-action@v4
        with:
          context: ./BE
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudprep-be:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudprep-be:${{ github.sha }}

      - name: FE 이미지 빌드 & 푸시
        uses: docker/build-push-action@v3
        with:
          context: ./FE
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudprep-fe:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cloudprep-fe:${{ github.sha }}

      - name: Slack 성공 알림
        if: success()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MESSAGE: "빌드 성공! ${{ github.event.head_commit.message }}"
          SLACK_COLOR: good

      - name: Slack 실패 알림
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_MESSAGE: "빌드 실패! ${{ github.event.head_commit.message }}"
          SLACK_COLOR: danger
